<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Your CSS (IMPORTANT) -->
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>

<div class="container mt-4">
    <section class="card p-4">

        <h2>Contact Form</h2>

<form id="contactForm">

    <input type="text" id="name" placeholder="Enter name" class="form-control mb-3">

    <input type="email" id="email" placeholder="Enter email" class="form-control mb-3">

    <textarea class="form-control mb-3"></textarea>

    <button type="submit" class="btn btn-primary">Submit</button>

    <p id="form-result"></p>

  </form>
<div class="quote-box">
    <p id="quote" class="fade">Quotes</p>

    <div class="buttons">
        <button onclick="generateQuote()">New Quote</button>
        <button onclick="copyQuote()">Copy Quote</button>
        <button onclick="startAuto()">Start Auto</button>
        <button onclick="stopAuto()">Stop</button>
    </div>

    </section>
<script src="/js/script.js"></script>
</body>
</html>
